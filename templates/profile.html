{% extends "base.html" %}
{% block title %}Профиль{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-user-circle"></i> Профиль пользователя</h3>
            </div>
            <div class="card-body">
                <p><strong>👤 Имя пользователя:</strong> {{ user.username }}</p>
                <p><strong>📧 Email:</strong> {{ user.email }}</p>
                <p><strong>📅 Дата регистрации:</strong> {{ user.created_at.strftime('%d.%m.%Y') }}</p>
                <hr>
                <a href="{{ url_for('favorites_list') }}" class="btn btn-outline-danger">
                    <i class="fas fa-heart"></i> Моё избранное
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
